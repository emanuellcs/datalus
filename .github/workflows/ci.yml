name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install ".[training,test]"
      - name: Run tests
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/component/package.json
      - name: Install and build component
        working-directory: frontend/component
        run: |
          npm install
          npm run test
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f deploy/docker/Dockerfile.api -t datalus-api:ci .
      - name: Build Streamlit image
        run: docker build -f deploy/docker/Dockerfile.streamlit -t datalus-streamlit:ci .
